<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workblock</title>
    <!-- Pi SDK Başlatma -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f0f0f0; }
        button { padding: 20px 40px; font-size: 20px; background-color: #6a1b9a; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1>Workblock</h1>
    <p>Global Regulatory-Aligned Web3 Employment</p>

    <button id="authBtn" onclick="authorizeWallet()">Authorize Workblock Wallet</button>
    <p id="status">Hazır...</p>

    <script>
        // Pi SDK init
        Pi.init({ version: "2.0" });

        async function authorizeWallet() {
            document.getElementById('status').innerText = "Cüzdan bağlantısı bekleniyor...";
            try {
                const scopes = ['wallet'];
                const auth = await Pi.authenticate(scopes, (err) => {
                    document.getElementById('status').innerText = "Yetkilendirme reddedildi: " + err;
                });
                document.getElementById('status').innerText = "Başarılı! Kullanıcı: " + auth.user.username;
            } catch (err) {
                document.getElementById('status').innerText = "Hata oluştu: " + err;
            }
        }
    </script>

</body>
</html>
