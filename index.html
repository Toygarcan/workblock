<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workblock</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; }
        .tab-content { display: none; padding: 20px; }
        .active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #333; display: flex; color: white; }
        .nav-btn { flex: 1; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="view-login" class="tab-content active">
    <h1>Workblock Giriş</h1>
    <button onclick="piLogin()">Pi ile Giriş Yap</button>
</div>

<div id="view-main" class="tab-content">
    <h1>Workblock Ekosistemi</h1>
    <p>Liyakat esaslı kariyer yönetimi.</p>
</div>

<div class="nav-bar" id="nav-bar" style="display:none;">
    <div class="nav-btn" onclick="switchTab('view-main')">Ana Sayfa</div>
    <div class="nav-btn" onclick="alert('Profil Sayfası')">Profil</div>
</div>

<script>
    Pi.init({ version: "2.0" });
    async function piLogin() {
        try {
            await Pi.authenticate(['username'], () => {});
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-main').classList.add('active');
            document.getElementById('nav-bar').style.display = 'flex';
        } catch(e) { alert("Hata: " + e); }
    }
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
