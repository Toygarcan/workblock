<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workblock</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f0f0f0; }
        button { padding: 20px 40px; font-size: 20px; background-color: #6a1b9a; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1>Workblock</h1>
    <p>Global Regulatory-Aligned Web3 Employment</p>

    <button id="authBtn" onclick="authorizeUser()">Authorize User</button>
    <p id="status">Hazır...</p>

    <script>
        Pi.init({ version: "2.0" });

        async function authorizeUser() {
            document.getElementById('status').innerText = "Bağlanıyor...";
            try {
                // Burada scopes listesini boş bıraktık ki izin hatası almayasın
                const auth = await Pi.authenticate([], (err) => {
                    document.getElementById('status').innerText = "Hata: " + err;
                });
                document.getElementById('status').innerText = "Hoş geldin, " + auth.user.username;
            } catch (err) {
                document.getElementById('status').innerText = "İşlem iptal edildi veya hata oluştu.";
            }
        }
    </script>

</body>
</html>
