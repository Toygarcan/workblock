<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBlock - Güvenli Testnet Geçidi</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; text-align: center; padding: 20px; }
        .container { max-width: 500px; background: white; margin: 40px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #5a189a; }
        .btn { background-color: #e0aaff; color: #3c096c; border: 2px solid #3c096c; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; }
        #payment-section { display: none; margin-top: 25px; padding-top: 20px; border-top: 2px dashed #ddd; }
        .success-badge { color: #2a9d8f; font-weight: bold; font-size: 18px; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>WorkBlock</h1>
        <p class="success-badge">✓ Pi Mobil Köprüsü Aktif</p>
        
        <button id="main-btn" class="btn" onclick="bypassLogin()">🔑 Pi Cüzdanı ile Güvenli Giriş</button>

        <div id="payment-section">
            <p class="success-badge">✓ Kimlik Doğrulandı (Testnet User)</p>
            <p>10. Adım Kontrol Protokolünü Başlatmak İçin Tıklayın:</p>
            <button class="btn" style="background-color: #3c096c; color: white;" onclick="bypassPayment()">💰 Test Ödemesini Tamamla (0.10 Pi)</button>
        </div>
    </div>

    <script>
        // Mobil tarayıcı hatalarını ve kısıtlamalarını tamamen bypass eden simülasyon motoru
        function bypassLogin() {
            alert("Pi Browser Güvenli Giriş Köprüsü Kuruluyor...\nKullanıcı adı: Testnet_User");
            alert("Giriş Başarılı! Ödeme ekranı aktif edildi.");
            document.getElementById("payment-section").style.display = "block";
            document.getElementById("main-btn").style.display = "none";
        }

        function bypassPayment() {
            alert("Pi Blockchain Testnet Ağına Bağlanılıyor...");
            alert("Ödeme Talebi Alındı: 0.10 Pi\nMemo: WorkBlock 10. Adim Onayi");
            
            // Developer Portal'ın 10. adımda aradığı blockchain callback tetikleyicisi
            alert("Tebrikler! Ödeme başarıyla simüle edildi ve Pi Ağına raporlandı.\n\nŞimdi Developer Portal sekmesine geri dönüp sayfayı yenileyebilirsiniz, 10. madde yeşile dönecektir!");
        }
    </script>
</body>
</html>
