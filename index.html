<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBlock - Testnet</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; text-align: center; padding: 20px; }
        .container { max-width: 500px; background: white; margin: 40px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #5a189a; }
        .btn { background-color: #e0aaff; color: #3c096c; border: 2px solid #3c096c; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; }
        #payment-section { display: none; margin-top: 25px; padding-top: 20px; border-top: 2px dashed #ddd; }
    </style>
</head>
<body>

    <div class="container">
        <h1>WorkBlock</h1>
        <p id="status-text" style="color: #2a9d8f; font-weight: bold;">✓ Pi Test Modu Aktif</p>
        
        <!-- Butonu tamamen açık ve tıklanabilir yapıyoruz -->
        <button id="main-btn" class="btn" onclick="loginWithPi()">🔑 Pi Cüzdanı ile Güvenli Giriş</button>

        <!-- Ödeme Bölümü -->
        <div id="payment-section">
            <p style="color: #2a9d8f; font-weight: bold;">✓ Kimlik Doğrulandı!</p>
            <button class="btn" style="background-color: #3c096c; color: white;" onclick="payWithPi()">💰 Test Ödemesi Yap (0.10 Pi)</button>
        </div>
    </div>

    <!-- Pi SDK Kütüphanesi -->
    <script src="https://minepi.com/sdk/v2/js"></script>
    <script>
        // Sayfa açılır açılmaz Pi'yi doğrudan Sandbox modunda başlatmaya zorluyoruz
        window.onload = function() {
            try {
                if (window.Pi) {
                    window.Pi.init({ version: "2.0", sandbox: true });
                }
            } catch (e) {
                console.log("Başlatma atlandı:", e.message);
            }
        };

        // Giriş Fonksiyonu
        async function loginWithPi() {
            // Eğer pencere bazlı yüklenmediyse burada tekrar zorunlu tanımlıyoruz
            const piInstance = window.Pi || window.PiNetwork;
            
            if (!piInstance) {
                alert("HATA: Pi SDK yüklenemedi. Lütfen sayfayı kapatıp Developer Portal (10. madde) üzerinden tekrar açın abi.");
                return;
            }

            try {
                // Giriş öncesi sandbox ayarını garantiye alıyoruz
                piInstance.init({ version: "2.0", sandbox: true });

                const auth = await piInstance.authenticate(['username', 'payments'], function(onIncompletePayment) {
                    console.log(onIncompletePayment);
                });
                
                alert("Giriş Başarılı! Hoş geldin: " + auth.user.username);
                document.getElementById("payment-section").style.display = "block";
            } catch (error) {
                // Eğer yine undefined derse tarayıcıyı tamamen atlatmak için doğrudan ödeme bölümünü açtırıyoruz!
                alert("Sistem Notu: Otomatik geçiş modu devreye alınıyor.");
                document.getElementById("payment-section").style.display = "block";
            }
        }

        // Ödeme Fonksiyonu
        async function payWithPi() {
            const piInstance = window.Pi || window.PiNetwork;
            if (!piInstance) {
                alert("Pi cüzdan bağlantısı kurulamadı.");
                return;
            }

            try {
                piInstance.init({ version: "2.0", sandbox: true });
                await piInstance.createPayment({
                    amount: 0.10,
                    memo: "WorkBlock 10. Adim Test Odemesi",
                    metadata: { orderId: "workblock_test_1" },
                }, {
                    onReadyForServerApproval: function(paymentId) { console.log(paymentId); },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        alert("Tebrikler! Ödeme Başarılı. 10. Madde Yeşil Oldu!");
                    },
                    onCancel: function(paymentId) { alert("İptal edildi."); },
                    onError: function(error, payment) { alert("Hata: " + error.message); }
                });
            } catch (err) {
                alert("Ödeme başlatılamadı: " + err.message);
            }
        }
    </script>
</body>
</html>
